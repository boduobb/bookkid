# bookkid.cloud - Nginx配置模板
# 安装Nginx: sudo apt install nginx
# 配置路径: /etc/nginx/sites-available/bookkid.cloud
# 创建软链接: sudo ln -s /etc/nginx/sites-available/bookkid.cloud /etc/nginx/sites-enabled/
# 测试配置: sudo nginx -t
# 重启Nginx: sudo systemctl restart nginx

server {
    listen 80;
    server_name bookkid.cloud www.bookkid.cloud;

    # HTTP重定向到HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name bookkid.cloud www.bookkid.cloud;

    # SSL证书配置（使用腾讯云SSL证书）
    ssl_certificate /etc/nginx/ssl/bookkid.cloud.crt;
    ssl_certificate_key /etc/nginx/ssl/bookkid.cloud.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 反向代理到Node.js服务
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 静态文件（如果有）
    location /static/ {
        root /var/www/bookkid;
        expires 30d;
    }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:3000/api/health;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}

# ============ SSL证书配置步骤 ============
# 1. 在腾讯云申请免费SSL证书
# 2. 下载证书文件（Nginx格式）
# 3. 创建证书目录: sudo mkdir -p /etc/nginx/ssl/
# 4. 上传证书文件:
#    - bookkid.cloud.crt → /etc/nginx/ssl/bookkid.cloud.crt
#    - bookkid.cloud.key → /etc/nginx/ssl/bookkid.cloud.key
# 5. 修改Nginx配置中的证书路径
# 6. 重启Nginx: sudo systemctl restart nginx